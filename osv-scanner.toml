# osv-scanner accepted-risk allowlist for the AI-Starter-Templates docs
# site (Astro Starlight static-site generator).
#
# Risk surface: this repo builds a static documentation site (HTML/CSS/JS
# only) served via Cloudflare Pages. There is no runtime authentication,
# no server-side request handling, no database, no user input processing.
# All listed CVEs affect dev/build-time tooling; the published artifact
# does not ship them as exploitable surface.
#
# Re-evaluate quarterly via `pnpm update` to drop entries that newer
# transitive versions have patched.


name: security-secrets

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: security-secrets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so gitleaks can scan every commit, not just the diff.
          fetch-depth: 0

      - name: Scan with gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # GitHub-provided token; gitleaks reads it to annotate PRs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Self-hosted free tier. Add GITLEAKS_LICENSE as a repo secret if the
          # org tier requires it.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # v4
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true
